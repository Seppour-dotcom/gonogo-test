<!doctype html><html lang='fa' dir='rtl'><head><meta charset='utf-8'>
<meta name='viewport' content='width=device-width,initial-scale=1'>
<title>Go/No-Go</title>
<style>
body{font-family:tahoma;background:#1b1b1b;color:#fff;text-align:center;margin:0}
#wrap{max-width:800px;margin:auto;padding:20px}#stim{width:140px;height:140px;margin:25px auto;border:4px solid #fff;display:none}
button,input{padding:8px;margin:4px}table{width:100%;background:#fff;color:#000;border-collapse:collapse}
td,th{border:1px solid #bbb;padding:4px;font-size:12px}
</style></head><body><div id=wrap>
<h2>آزمون Go / No-Go</h2>
<div id=form>نام <input id=n> کد <input id=c> سن <input id=a size=3>
<p> 🟩 مربع سبز: کلید Space یا دکمه «پاسخ» <br><br> 🟥 مربع قرمز: هیچ کاری انجام ندهید </p>
<button onclick=start()>شروع</button></div>
<div id=count></div><div id=stim></div><div id=out></div><div id=count></div>

<div id=stim></div>

<button id="resp" style="display:none;font-size:22px;padding:14px 35px;margin:20px;cursor:pointer;">
پاسخ
</button>

<div id=out></div>
<script>
const prac=[...Array(6).fill('G'),...Array(4).fill('R')],main=[...Array(42).fill('G'),...Array(28).fill('R')];
function sh(x){for(let i=x.length-1;i>0;i--){let j=Math.floor(Math.random()*(i+1));[x[i],x[j]]=[x[j],x[i]];}return x}
let t=[],i=-1,pressed=false,t0,res=[];
function respond(){

    if(pressed || i<0) return;

    pressed=true;

    res[i].pressed=true;

    res[i].rt=Math.round(performance.now()-t0);

}
function start(){form.style.display='none';t=[...sh(prac.slice()),...sh(main.slice())];let c=3;count.innerHTML='<h1>'+c+'</h1>';let iv=setInterval(()=>{c--;count.innerHTML='<h1>'+c+'</h1>';if(c==0){clearInterval(iv);count.innerHTML='';next();}},1000)}
document.onkeydown=e=>{

    if(e.code==="Space"){

        e.preventDefault();

        respond();

    }

};

resp.onclick=respond;

document.addEventListener("touchstart",function(e){

    if(resp.style.display==="none") return;

    e.preventDefault();

    respond();

},{passive:false});
function next(){

    i++;

    if(i>=t.length)return finish();

    pressed=false;

    stim.style.display='block';

    resp.style.display='inline-block';

    stim.style.background=t[i]=='G'
        ?'#18c441'
        :'#d22';

    t0=performance.now();

    res[i]={
        phase:i<10?'تمرین':'اصلی',
        stim:t[i],
        pressed:false,
        rt:''
    };

    setTimeout(()=>{

        stim.style.display='none';

        resp.style.display='none';

        setTimeout(next,500);

    },500);

}
res.forEach((r,k)=>{let ok,txt;
if(r.stim=='G'){if(r.pressed){ok=true;cor++;rts.push(r.rt);txt='✅ صحیح'}else{ok=false;omi++;txt='❌ Omission';}}
else{if(r.pressed){ok=false;com++;txt='❌ Commission'}else{ok=true;cor++;txt='✅ صحیح';}}
rows+=`<tr><td>${k+1}</td><td>${r.phase}</td><td>${r.stim=='G'?'🟩':'🟥'}</td><td>${r.pressed?'فشار داد':'نداد'}</td><td>${r.rt}</td><td>${txt}</td></tr>`;
});
let wrong=com+omi,avg=rts.length?(rts.reduce((a,b)=>a+b,0)/rts.length).toFixed(1):0,min=rts.length?Math.min(...rts):'-',max=rts.length?Math.max(...rts):'-';
out.innerHTML=`<h3>نتایج</h3>
<p>پاسخ صحیح: ${cor}<br>پاسخ غلط: ${wrong}<br>Commission: ${com}<br>Omission: ${omi}<br>دقت: ${(cor/res.length*100).toFixed(1)}%<br>میانگین RT: ${avg} ms<br>حداقل: ${min} ms<br>حداکثر: ${max} ms</p>
<button onclick='csv()'>دانلود CSV</button>
<table><tr><th>#</th><th>مرحله</th><th>محرک</th><th>پاسخ</th><th>RT</th><th>نتیجه</th></tr>${rows}</table>`}
function csv(){let s='Trial,Phase,Stimulus,Pressed,RT\n';res.forEach((r,k)=>s+=`${k+1},${r.phase},${r.stim},${r.pressed},${r.rt}\n`);let a=document.createElement('a');a.href=URL.createObjectURL(new Blob([s]));a.download='results.csv';a.click();}
</script></body></html>
