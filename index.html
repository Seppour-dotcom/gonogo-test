<!doctype html>
<html lang="fa" dir="rtl">

<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Go / No-Go</title>

<style>
body{
    font-family:tahoma;
    background:#1b1b1b;
    color:white;
    text-align:center;
    margin:0;
}
#wrap{
    max-width:800px;
    margin:auto;
    padding:20px;
}
#stim{
    width:140px;
    height:140px;
    margin:25px auto;
    border:4px solid white;
    display:none;
}
button,input{
    padding:8px;
    margin:4px;
}
table{
    width:100%;
    border-collapse:collapse;
    background:white;
    color:black;
}
td,th{
    border:1px solid #aaa;
    padding:5px;
    font-size:12px;
}
</style>

</head>

<body>

<div id="wrap">

<h2>آزمون Go / No-Go</h2>

<div id="form">

<p>
تعداد Trial
<select id="trialCount">
<option>50</option>
<option>55</option>
<option>60</option>
<option>65</option>
<option selected>70</option>
</select>
</p>

<p>
مدت نمایش محرک
<select id="speed">
<option>500</option>
<option>550</option>
<option>600</option>
<option>650</option>
<option>700</option>
<option>750</option>
<option>800</option>
<option>850</option>
<option selected>900</option>
</select>
میلی‌ثانیه
</p>

<p>
🟩 مربع سبز: Space یا لمس صفحه
<br><br>
🟥 مربع قرمز: هیچ کاری انجام ندهید
</p>

<button onclick="start()">شروع آزمون</button>

</div>

<div id="count"></div>

<div id="stim"></div>

<button id="resp"
style="
display:none;
position:fixed;
bottom:30px;
left:50%;
transform:translateX(-50%);
font-size:22px;
padding:18px 50px;
z-index:1000;
cursor:pointer;
">
پاسخ
</button>

<div id="out"></div>

</div>

<script>

const practice=[
...Array(6).fill("G"),
...Array(4).fill("R")
];

const main=[
...Array(42).fill("G"),
...Array(28).fill("R")
];

function shuffle(arr){
for(let i=arr.length-1;i>0;i--){
let j=Math.floor(Math.random()*(i+1));
[arr[i],arr[j]]=[arr[j],arr[i]];
}
return arr;
}

let trials=[];
let res=[];
let i=-1;
let pressed=false;
let stimulusOn=false;   // جدید
let stimTime=900;
let t0=0;

function respond(){

if(!stimulusOn) return;   // فقط هنگام نمایش محرک

if(pressed) return;
if(i<0) return;

pressed=true;

res[i].pressed=true;
res[i].rt=Math.round(performance.now()-t0);

}

document.onkeydown=function(e){

if(e.code==="Space"){
e.preventDefault();
respond();
}

}
document.addEventListener("pointerdown",function(e){

    if(!stimulusOn) return;

    respond();

});

function start(){

document.getElementById("form").style.display="none";

// خواندن تنظیمات انتخاب‌شده توسط کاربر
stimTime = parseInt(document.getElementById("speed").value);
let totalTrials = parseInt(document.getElementById("trialCount").value);

// این قسمت را بعداً تغییر می‌دهیم
let greens=Math.round(totalTrials*0.6);
let reds=totalTrials-greens;

let selected=[
...Array(greens).fill("G"),
...Array(reds).fill("R")
];

trials=[
...shuffle(practice.slice()),
...shuffle(selected)
];

let c=3;

count.innerHTML="<h1>"+c+"</h1>";

let iv=setInterval(function(){

c--;

if(c>0){

count.innerHTML="<h1>"+c+"</h1>";

}else{

clearInterval(iv);

count.innerHTML="";

next();

}

},1000);

}

function next(){

i++;

if(i>=trials.length){

finish();

return;

}

pressed=false;

stimulusOn=true;

stim.style.display="block";

stim.style.background=
trials[i]=="G" ?
"#18c441":
"#d22";

t0=performance.now();

res[i]={
phase:i<10?"تمرین":"اصلی",
stim:trials[i],
pressed:false,
rt:""
};

setTimeout(function(){

stim.style.display="none";

stimulusOn=false;

setTimeout(next,stimTime);

},stimTime);

}

function finish(){

stimulusOn=false;
resp.style.display="none";

let cor=0;
let com=0;
let omi=0;
let rts=[];
let rows="";

res.forEach(function(r,k){

let txt="";

if(r.stim=="G"){

if(r.pressed){

cor++;
txt="✅ صحیح";
rts.push(r.rt);

}else{

omi++;
txt="❌ Omission";

}

}else{

if(r.pressed){

com++;
txt="❌ Commission";

}else{

cor++;
txt="✅ صحیح";

}

}

rows+=`
<tr>
<td>${k+1}</td>
<td>${r.phase}</td>
<td>${r.stim=="G"?"🟩":"🟥"}</td>
<td>${r.pressed?"فشار داد":"نداد"}</td>
<td>${r.rt}</td>
<td>${txt}</td>
</tr>
`;

});

let wrong=com+omi;

let avg=rts.length?
(rts.reduce((a,b)=>a+b,0)/rts.length).toFixed(1)
:"-";

let min=rts.length?
Math.min(...rts)
:"-";

let max=rts.length?
Math.max(...rts)
:"-";

out.innerHTML=`

<h3>نتایج آزمون</h3>

<p>

پاسخ صحیح: ${cor}<br>

پاسخ غلط: ${wrong}<br>

Commission: ${com}<br>

Omission: ${omi}<br>

دقت: ${(cor/res.length*100).toFixed(1)} %<br>

میانگین RT: ${avg} ms<br>

حداقل RT: ${min} ms<br>

حداکثر RT: ${max} ms

</p>

<button onclick="csv()">

دانلود CSV

</button>

<table>

<tr>

<th>#</th>

<th>مرحله</th>

<th>محرک</th>

<th>پاسخ</th>

<th>RT</th>

<th>نتیجه</th>

</tr>

${rows}

</table>

`;

}

function csv(){

let s="Trial,Phase,Stimulus,Pressed,RT\n";

res.forEach(function(r,k){

s+=`${k+1},${r.phase},${r.stim},${r.pressed},${r.rt}\n`;

});

let blob=new Blob([s],{type:"text/csv;charset=utf-8;"});

let a=document.createElement("a");

a.href=URL.createObjectURL(blob);

a.download="results.csv";

a.click();

}

</script>

</body>
</html>
